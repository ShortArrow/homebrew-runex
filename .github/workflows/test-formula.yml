name: test-formula

on:
  push:
    branches: [main]
    paths:
      - 'Formula/**.rb'
      - '.github/workflows/test-formula.yml'
  pull_request:
    paths:
      - 'Formula/**.rb'
      - '.github/workflows/test-formula.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  HOMEBREW_TAP_REPOSITORY: ${{ github.workspace }}/_tap

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, ubuntu-24.04]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compute tap path
        id: tap
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            if [[ "${RUNNER_ARCH}" == "ARM64" ]]; then
              prefix=/opt/homebrew
            else
              prefix=/usr/local
            fi
          else
            prefix=/home/linuxbrew/.linuxbrew
          fi
          echo "path=${prefix}/Library/Taps/shortarrow/homebrew-runex" >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ steps.tap.outputs.path }}

      - name: Install formula
        run: brew install shortarrow/runex/runex

      - name: brew test
        run: brew test shortarrow/runex/runex

      - name: Smoke-test runex CLI
        run: |
          runex version
          runex doctor || true
